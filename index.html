<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Lead Inbox · 管理后台</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:14px}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Hiragino Sans GB",sans-serif;background:#f4f3ef;color:#1a1a1a;min-height:100vh}

/* ─── 弹窗遮罩 ─── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:2000}
.overlay.hidden{display:none}
.cfg-card{background:#fff;border-radius:16px;padding:32px;width:460px;max-width:90vw}
.cfg-card h2{font-size:18px;font-weight:600;margin-bottom:6px}
.cfg-card p{font-size:13px;color:#666;margin-bottom:22px;line-height:1.6}
.cfg-card label{display:block;font-size:12px;color:#777;margin-bottom:4px;margin-top:13px}
.cfg-card input{width:100%;padding:9px 11px;border:1px solid #e2e2e2;border-radius:8px;font-size:12px;font-family:monospace;color:#1a1a1a;outline:none;background:#fafafa}
.cfg-card input:focus{border-color:#aaa;background:#fff}
.cfg-btn{width:100%;margin-top:20px;padding:11px;background:#1a1a1a;color:#fff;border:none;border-radius:9px;font-size:14px;font-weight:500;cursor:pointer;font-family:inherit}
.cfg-btn:hover{opacity:.85}

/* ─── 导航 ─── */
.nav{background:#fff;border-bottom:1px solid #eee;padding:0 28px;height:54px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.nav-logo{display:flex;align-items:center;gap:8px}
.nav-dot{width:9px;height:9px;border-radius:50%;background:#FAC775}
.nav-title{font-size:15px;font-weight:600}
.nav-sub{font-size:12px;color:#bbb;margin-left:4px}
.nav-right{display:flex;align-items:center;gap:8px}
.sync-status{font-size:11px;color:#1D9E75;display:flex;align-items:center;gap:5px}
.sync-dot{width:6px;height:6px;border-radius:50%;background:#1D9E75}
.sync-dot.spin{background:#FAC775;animation:blink .7s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.25}}
.nav-btn{padding:6px 13px;font-size:12px;border:1px solid #e4e4e4;border-radius:7px;background:#fff;color:#555;cursor:pointer;font-family:inherit}
.nav-btn:hover{border-color:#aaa;color:#1a1a1a}

/* ─── 主容器 ─── */
.wrap{max-width:1200px;margin:0 auto;padding:26px 22px}

/* ─── 统计 ─── */
.stats{display:grid;grid-template-columns:repeat(5,1fr);gap:11px;margin-bottom:22px}
.stat{background:#fff;border-radius:11px;padding:15px;border:1px solid #eee}
.stat-lbl{font-size:11px;color:#bbb;text-transform:uppercase;letter-spacing:.05em;margin-bottom:5px}
.stat-val{font-size:24px;font-weight:600}
.stat-note{font-size:10px;color:#bbb;margin-top:3px}

/* ─── 工具栏 ─── */
.toolbar-wrap{background:#fff;border-radius:11px;border:1px solid #eee;padding:14px 16px;margin-bottom:14px}
.toolbar-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.toolbar-row+.toolbar-row{margin-top:10px;padding-top:10px;border-top:1px solid #f4f4f4}
.search-wrap{flex:1;min-width:200px;display:flex;align-items:center;background:#f7f7f5;border:1px solid #eee;border-radius:8px;padding:0 11px}
.search-wrap input{flex:1;border:none;outline:none;font-size:13px;padding:8px 0;font-family:inherit;background:transparent;color:#1a1a1a}
.search-ico{color:#ccc;font-size:13px;margin-right:6px}
.filter-label{font-size:11px;color:#bbb;white-space:nowrap;font-weight:500;text-transform:uppercase;letter-spacing:.04em;flex-shrink:0;width:42px}
.pills-row{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.pill{padding:5px 12px;font-size:12px;border:1px solid #e8e8e8;border-radius:18px;background:#fff;color:#666;cursor:pointer;font-family:inherit;white-space:nowrap;transition:all .12s}
.pill:hover{border-color:#bbb;color:#333}
.pill.on{background:#1a1a1a;color:#fff;border-color:#1a1a1a}
.toolbar-btn{padding:6px 14px;font-size:12px;border:1px solid #e8e8e8;border-radius:8px;background:#fff;color:#555;cursor:pointer;font-family:inherit}
.toolbar-btn:hover{border-color:#aaa}

/* ─── 表格（新增 quality 列，共 7 列）─── */
.table-wrap{background:#fff;border-radius:13px;border:1px solid #eee;overflow:visible}
.t-head,.t-row{
  display:grid;
  grid-template-columns:minmax(0,2fr) 88px 100px 88px 100px 110px 80px;
  gap:8px;padding:11px 16px;align-items:center
}
.t-head{font-size:11px;color:#bbb;text-transform:uppercase;letter-spacing:.05em;border-bottom:1px solid #f2f2f2;border-radius:13px 13px 0 0;background:#fff}
.t-row{border-bottom:1px solid #fafafa;transition:background .1s;position:relative}
.t-row:last-child{border-bottom:none}
.t-row:hover{background:#fafafa}

.lead-val{font-size:13px;color:#222;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.lead-val a{color:#378ADD;text-decoration:none}
.lead-val a:hover{text-decoration:underline}
.lead-sub{margin-top:3px;font-size:11px;color:#aaa;display:flex;flex-wrap:wrap;gap:6px}
.contact-item{display:flex;align-items:center;gap:3px;white-space:nowrap}

/* ─── 徽章（可点击下拉）─── */
.badge{font-size:11px;font-weight:500;padding:3px 9px;border-radius:10px;display:inline-block;white-space:nowrap;cursor:pointer;border:1px solid transparent;transition:filter .12s;user-select:none}
.badge:hover{filter:brightness(.93)}
/* 质量标签：稍大字号更醒目 */
.badge-quality{font-size:12px;font-weight:600;padding:3px 10px;border-radius:10px;display:inline-block;white-space:nowrap;cursor:pointer;border:1px solid transparent;transition:filter .12s;user-select:none}
.badge-quality:hover{filter:brightness(.93)}
/* 空质量：虚线提示 */
.badge-empty{font-size:11px;color:#ccc;border:1px dashed #e0e0e0;padding:3px 9px;border-radius:10px;cursor:pointer;background:transparent;font-family:inherit;display:inline-block;white-space:nowrap}
.badge-empty:hover{border-color:#bbb;color:#aaa}

/* ─── 全局下拉（fixed，不受 overflow 裁剪）─── */
.global-drop{
  position:fixed;background:#fff;border:1px solid #e0e0e0;border-radius:10px;
  padding:5px;min-width:120px;max-height:280px;overflow-y:auto;
  z-index:1000;box-shadow:0 6px 20px rgba(0,0,0,.12);display:none
}
.global-drop.open{display:block}
.drop-opt{padding:7px 10px;border-radius:6px;font-size:12px;cursor:pointer;display:flex;align-items:center;gap:7px;white-space:nowrap}
.drop-opt:hover{background:#f5f5f5}
.drop-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.drop-divider{height:1px;background:#f0f0f0;margin:4px 0}
.drop-none{padding:7px 10px;border-radius:6px;font-size:12px;cursor:pointer;color:#bbb;display:flex;align-items:center;gap:7px}
.drop-none:hover{background:#f5f5f5;color:#999}

/* ─── 转让弹窗 ─── */
.transfer-modal{
  position:fixed;inset:0;background:rgba(0,0,0,.4);
  display:flex;align-items:center;justify-content:center;z-index:3000
}
.transfer-modal.hidden{display:none}
.transfer-card{background:#fff;border-radius:14px;padding:28px;width:340px;max-width:92vw}
.transfer-card h3{font-size:15px;font-weight:600;margin-bottom:6px}
.transfer-card p{font-size:12px;color:#888;margin-bottom:18px;line-height:1.6}
.member-list{display:flex;flex-direction:column;gap:7px;max-height:260px;overflow-y:auto;margin-bottom:18px}
.member-opt{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:9px;border:1px solid #eee;cursor:pointer;transition:all .12s}
.member-opt:hover{border-color:#bbb;background:#fafafa}
.member-opt.selected{border-color:#1a1a1a;background:#f5f5f5}
.m-av{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}
.m-name{font-size:13px;font-weight:500}
.m-count{font-size:11px;color:#bbb;margin-left:auto}
.transfer-actions{display:flex;gap:8px}
.btn-cancel{flex:1;padding:9px;border:1px solid #e4e4e4;border-radius:8px;background:#fff;color:#555;font-size:13px;cursor:pointer;font-family:inherit}
.btn-cancel:hover{border-color:#aaa}
.btn-confirm{flex:1;padding:9px;border:none;border-radius:8px;background:#1a1a1a;color:#fff;font-size:13px;font-weight:500;cursor:pointer;font-family:inherit}
.btn-confirm:hover{opacity:.85}
.btn-confirm:disabled{opacity:.4;cursor:default}

/* ─── 负责人列 ─── */
.who{display:flex;align-items:center;gap:6px;cursor:pointer;border-radius:7px;padding:2px 4px;transition:background .12s}
.who:hover{background:#f0f0f0}
.who-av{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0}
.who-name{font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.who-icon{font-size:10px;color:#ccc;margin-left:2px;flex-shrink:0}

/* ─── 操作按钮 ─── */
.row-btns{display:flex;gap:4px}
.row-btn{padding:3px 8px;font-size:11px;border:1px solid #e8e8e8;border-radius:5px;cursor:pointer;background:transparent;color:#888;font-family:inherit}
.row-btn:hover{border-color:#bbb;color:#333}
.row-btn.del:hover{border-color:#D85A30;color:#D85A30;background:#FAECE7}

.lead-time{font-size:11px;color:#bbb;white-space:nowrap}
.empty{padding:56px 20px;text-align:center;color:#ccc;font-size:14px}
.result-count{font-size:12px;color:#aaa;padding:10px 18px;border-top:1px solid #f4f4f4;text-align:right}

/* ─── 团队 ─── */
.team-box{margin-top:22px;background:#fff;border-radius:13px;border:1px solid #eee;padding:18px}
.box-title{font-size:11px;color:#bbb;text-transform:uppercase;letter-spacing:.06em;margin-bottom:13px}
.team-list{display:flex;flex-wrap:wrap;gap:9px}
.team-chip{display:flex;align-items:center;gap:7px;background:#fafafa;border:1px solid #eee;border-radius:18px;padding:5px 13px;cursor:pointer;transition:border-color .12s}
.team-chip:hover{border-color:#bbb}
.team-chip.on{border-color:#1a1a1a;background:#f0f0f0}
.team-av{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700}
.team-n{font-size:13px}
.team-c{font-size:12px;color:#aaa}

/* ─── 设置抽屉 ─── */
.drawer{position:fixed;top:0;right:-420px;width:400px;height:100vh;background:#fff;border-left:1px solid #eee;z-index:500;transition:right .25s ease;overflow-y:auto;padding:24px}
.drawer.open{right:0}
.drawer-title{font-size:16px;font-weight:600;margin-bottom:20px;display:flex;align-items:center;justify-content:space-between}
.drawer-close{background:none;border:none;cursor:pointer;font-size:20px;color:#aaa;line-height:1}
.drawer-close:hover{color:#333}
.drawer-sec{margin-bottom:26px}
.drawer-sec h3{font-size:12px;color:#999;text-transform:uppercase;letter-spacing:.06em;margin-bottom:12px}
.cfg-item{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:8px;border:1px solid #f0f0f0;margin-bottom:7px;background:#fafafa}
.cfg-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.cfg-name{flex:1;font-size:13px}
.cfg-del{background:none;border:none;cursor:pointer;color:#ddd;font-size:14px;padding:2px 4px}
.cfg-del:hover{color:#D85A30}
.add-row{display:flex;gap:7px;margin-top:10px}
.add-row input{flex:1;padding:8px 10px;border:1px solid #e4e4e4;border-radius:7px;font-size:13px;font-family:inherit;outline:none;background:#fafafa}
.add-row input:focus{border-color:#aaa;background:#fff}
.color-pick{display:flex;gap:5px;margin-top:8px;flex-wrap:wrap}
.color-sw{width:20px;height:20px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:transform .1s}
.color-sw:hover{transform:scale(1.15)}
.color-sw.on{border-color:#1a1a1a}
.add-ok{padding:8px 14px;background:#1a1a1a;color:#fff;border:none;border-radius:7px;font-size:12px;cursor:pointer;font-family:inherit;flex-shrink:0}
.add-ok:hover{opacity:.85}
</style>
</head>
<body>

<!-- 配置弹窗 -->
<div class="overlay" id="overlay">
  <div class="cfg-card">
    <h2>连接数据库</h2>
    <p>填写 Supabase 信息后即可访问你的线索库，配置只保存在本浏览器中。</p>
    <label>Supabase 项目 URL</label>
    <input id="cfg-url" placeholder="https://xxxx.supabase.co"/>
    <label>Supabase Anon Key</label>
    <input id="cfg-key" placeholder="eyJhbGci..."/>
    <button class="cfg-btn" id="btn-connect">进入管理后台</button>
  </div>
</div>

<!-- 转让弹窗 -->
<div class="transfer-modal hidden" id="transfer-modal">
  <div class="transfer-card">
    <h3>转让线索给</h3>
    <p id="transfer-desc">选择要转让给的团队成员</p>
    <div class="member-list" id="member-list"></div>
    <div class="transfer-actions">
      <button class="btn-cancel" onclick="closeTransfer()">取消</button>
      <button class="btn-confirm" id="btn-confirm-transfer" onclick="confirmTransfer()" disabled>确认转让</button>
    </div>
  </div>
</div>

<!-- 导航 -->
<nav class="nav">
  <div class="nav-logo">
    <div class="nav-dot"></div>
    <span class="nav-title">Lead Inbox</span>
    <span class="nav-sub">管理后台</span>
  </div>
  <div class="nav-right">
    <div class="sync-status"><div class="sync-dot" id="sdot"></div><span id="stxt">已同步</span></div>
    <button class="nav-btn" onclick="loadAll()">刷新</button>
    <button class="nav-btn" onclick="openDrawer()">⚙ 自定义</button>
    <button class="nav-btn" onclick="resetCfg()">重新配置</button>
  </div>
</nav>

<div class="wrap">

  <!-- 统计 -->
  <div class="stats">
    <div class="stat"><div class="stat-lbl">筛选结果</div><div class="stat-val" id="s0">—</div><div class="stat-note" id="s0-note"></div></div>
    <div class="stat"><div class="stat-lbl">待触达</div><div class="stat-val" id="s1">—</div><div class="stat-note" id="s1-note"></div></div>
    <div class="stat"><div class="stat-lbl">建联中</div><div class="stat-val" id="s2">—</div><div class="stat-note"></div></div>
    <div class="stat"><div class="stat-lbl">合作中</div><div class="stat-val" id="s3">—</div><div class="stat-note"></div></div>
    <div class="stat"><div class="stat-lbl">本周新增</div><div class="stat-val" id="s4">—</div><div class="stat-note" id="s4-note"></div></div>
  </div>

  <!-- 工具栏 -->
  <div class="toolbar-wrap">
    <div class="toolbar-row">
      <div class="search-wrap">
        <span class="search-ico">🔍</span>
        <input id="q" placeholder="搜索线索、姓名、渠道、状态、质量..." oninput="applyFilters()"/>
      </div>
      <button class="toolbar-btn" onclick="exportCSV()">导出 CSV</button>
    </div>
    <div class="toolbar-row">
      <span class="filter-label">渠道</span>
      <div class="pills-row" id="ch-pills"></div>
    </div>
    <div class="toolbar-row">
      <span class="filter-label">状态</span>
      <div class="pills-row" id="st-pills"></div>
    </div>
    <!-- 新增：质量筛选 -->
    <div class="toolbar-row">
      <span class="filter-label">质量</span>
      <div class="pills-row" id="q-pills"></div>
    </div>
    <div class="toolbar-row">
      <span class="filter-label">时间</span>
      <div class="pills-row" id="time-pills">
        <button class="pill on" data-time="all">全部</button>
        <button class="pill" data-time="today">今天</button>
        <button class="pill" data-time="week">本周</button>
        <button class="pill" data-time="month">本月</button>
      </div>
    </div>
    <div class="toolbar-row">
      <span class="filter-label">负责人</span>
      <div class="pills-row" id="who-pills"><button class="pill on" data-who="all">全部</button></div>
    </div>
  </div>

  <!-- 表格 -->
  <div class="table-wrap">
    <div class="t-head">
      <div>线索内容 / 联系人</div>
      <div>渠道</div>
      <div>状态</div>
      <div>质量</div>
      <div>负责人</div>
      <div>时间</div>
      <div>操作</div>
    </div>
    <div id="tbody"><div class="empty">正在加载...</div></div>
    <div class="result-count" id="result-count" style="display:none"></div>
  </div>

  <!-- 团队贡献 -->
  <div class="team-box" id="team-box" style="display:none">
    <div class="box-title">团队贡献（点击按负责人筛选）</div>
    <div class="team-list" id="team-list"></div>
  </div>
</div>

<!-- 设置抽屉 -->
<div class="drawer" id="drawer">
  <div class="drawer-title">自定义配置<button class="drawer-close" onclick="closeDrawer()">×</button></div>
  <div class="drawer-sec">
    <h3>渠道管理</h3>
    <div id="ch-list"></div>
    <div class="add-row"><input id="new-ch" placeholder="渠道名称" maxlength="20"/><button class="add-ok" onclick="addChannel()">添加</button></div>
    <div class="color-pick" id="ch-swatches"></div>
  </div>
  <div class="drawer-sec">
    <h3>状态管理</h3>
    <div id="st-list"></div>
    <div class="add-row"><input id="new-st" placeholder="状态名称" maxlength="20"/><button class="add-ok" onclick="addStatus()">添加</button></div>
    <div class="color-pick" id="st-swatches"></div>
  </div>
  <!-- 新增：质量管理 -->
  <div class="drawer-sec">
    <h3>客户质量标签</h3>
    <div id="ql-list"></div>
    <div class="add-row"><input id="new-ql" placeholder="质量标签名称" maxlength="20"/><button class="add-ok" onclick="addQuality()">添加</button></div>
    <div class="color-pick" id="ql-swatches"></div>
  </div>
</div>

<!-- 全局下拉 -->
<div class="global-drop" id="global-drop"></div>

<script>
// ═══════════════════════════════════════════
// 数据
// ═══════════════════════════════════════════
let C={url:'',key:''};
let allLeads=[], allChannels=[], allStatuses=[], allQualities=[];
let fCh='all', fSt='all', fQl='all', fTime='all', fWho='all';
let newChColor='pink', newStColor='blue', newQlColor='teal';
let openDropId=null, openDropType=null;

// 转让相关
let transferLeadId=null, transferSelectedMember=null;

const COLORS={
  pink:['#FBEAF0','#99234E'], blue:['#E6F1FB','#185FA5'], teal:['#E1F5EE','#085041'],
  green:['#EAF3DE','#27500A'], amber:['#FAEEDA','#633806'], purple:['#EEEDFE','#3C3489'],
  coral:['#FAECE7','#712B13'], gray:['#f0f0f0','#666']
};
const COLOR_NAMES=['pink','blue','teal','green','amber','purple','coral','gray'];
const AVATAR_C=[['#E6F1FB','#185FA5'],['#E1F5EE','#085041'],['#FAEEDA','#633806'],
                ['#FBEAF0','#72243E'],['#EEEDFE','#3C3489'],['#EAF3DE','#27500A']];
function nameColor(n){if(!n)return AVATAR_C[0];let h=0;for(const c of n)h=(h*31+c.charCodeAt(0))&0x7fffffff;return AVATAR_C[h%AVATAR_C.length]}
function badgeStyle(color){const[bg,t]=(COLORS[color]||COLORS.gray);return`background:${bg};color:${t}`}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function fmtDate(ts){const d=new Date(ts);return`${d.getFullYear()}/${d.getMonth()+1}/${d.getDate()} ${d.getHours()}:${String(d.getMinutes()).padStart(2,'0')}`}

// ═══════════════════════════════════════════
// API
// ═══════════════════════════════════════════
async function api(path,opts={}){
  const r=await fetch(`${C.url}/rest/v1${path}`,{...opts,headers:{
    'apikey':C.key,'Authorization':`Bearer ${C.key}`,'Content-Type':'application/json',...(opts.headers||{})
  }});
  if(!r.ok)throw new Error(await r.text());
  const t=await r.text();return t?JSON.parse(t):null;
}

async function loadAll(){
  setSyncing(true);
  try{
    [allLeads,allChannels,allStatuses,allQualities]=await Promise.all([
      api('/leads?select=*&order=created_at.desc'),
      api('/lead_channels?select=*&order=sort_order'),
      api('/lead_statuses?select=*&order=sort_order'),
      api('/lead_qualities?select=*&order=sort_order')
    ]);
    buildWhoPills();
    renderFilterPills();
    applyFilters();
    renderTeam();
    renderDrawer();
  }catch(e){
    document.getElementById('tbody').innerHTML=`<div class="empty">加载失败：${esc(e.message)}</div>`;
  }finally{setSyncing(false)}
}

// ═══════════════════════════════════════════
// 筛选
// ═══════════════════════════════════════════
function getTimeRange(){
  const now=new Date(),d=new Date();
  if(fTime==='today'){d.setHours(0,0,0,0);return d.getTime()}
  if(fTime==='week'){d.setDate(now.getDate()-now.getDay());d.setHours(0,0,0,0);return d.getTime()}
  if(fTime==='month'){d.setDate(1);d.setHours(0,0,0,0);return d.getTime()}
  return 0;
}

function getFiltered(){
  const q=document.getElementById('q').value.toLowerCase();
  const since=getTimeRange();
  return allLeads.filter(l=>{
    if(fCh!=='all'&&l.channel!==fCh)return false;
    if(fSt!=='all'&&l.status!==fSt)return false;
    if(fQl!=='all'){
      if(fQl==='__none__'&&l.quality)return false;
      if(fQl!=='__none__'&&l.quality!==fQl)return false;
    }
    if(fWho!=='all'&&(l.added_by||'未知')!==fWho)return false;
    if(since&&new Date(l.created_at).getTime()<since)return false;
    if(!q)return true;
    return[l.value,l.added_by,l.channel,l.status,l.quality,l.contact_name,l.phone,l.email_contact,l.wechat,l.note]
      .filter(Boolean).some(v=>String(v).toLowerCase().includes(q));
  });
}

function applyFilters(){
  const filtered=getFiltered();
  renderStats(filtered);
  renderTable(filtered);
}

function renderStats(filtered){
  const total=filtered.length,allTotal=allLeads.length;
  document.getElementById('s0').textContent=total;
  document.getElementById('s0-note').textContent=total===allTotal?`共 ${allTotal} 条`:`共 ${allTotal} 条中`;
  const pending=filtered.filter(l=>l.status==='待触达').length;
  document.getElementById('s1').textContent=pending;
  document.getElementById('s1-note').textContent=total?`占 ${Math.round(pending/total*100)}%`:'';
  document.getElementById('s2').textContent=filtered.filter(l=>l.status==='建联中').length;
  document.getElementById('s3').textContent=filtered.filter(l=>l.status==='合作中').length;
  const weekAgo=Date.now()-7*86400000;
  document.getElementById('s4').textContent=filtered.filter(l=>new Date(l.created_at)>weekAgo).length;
  document.getElementById('s4-note').textContent=fTime==='all'?'近 7 天':'当前时段';
}

// ═══════════════════════════════════════════
// 筛选 Pills
// ═══════════════════════════════════════════
function renderFilterPills(){
  // 渠道
  let h=`<button class="pill${fCh==='all'?' on':''}" onclick="setF('ch','all')">全部</button>`;
  allChannels.forEach(c=>{h+=`<button class="pill${fCh===c.name?' on':''}" onclick="setF('ch','${esc(c.name)}')">${esc(c.name)}</button>`;});
  document.getElementById('ch-pills').innerHTML=h;
  // 状态
  let s=`<button class="pill${fSt==='all'?' on':''}" onclick="setF('st','all')">全部</button>`;
  allStatuses.forEach(x=>{s+=`<button class="pill${fSt===x.name?' on':''}" onclick="setF('st','${esc(x.name)}')">${esc(x.name)}</button>`;});
  document.getElementById('st-pills').innerHTML=s;
  // 质量
  let ql=`<button class="pill${fQl==='all'?' on':''}" onclick="setF('ql','all')">全部</button>`;
  allQualities.forEach(x=>{ql+=`<button class="pill${fQl===x.name?' on':''}" onclick="setF('ql','${esc(x.name)}')">${esc(x.name)}</button>`;});
  ql+=`<button class="pill${fQl==='__none__'?' on':''}" onclick="setF('ql','__none__')">未标记</button>`;
  document.getElementById('q-pills').innerHTML=ql;
  // 时间
  document.querySelectorAll('#time-pills .pill').forEach(p=>p.classList.toggle('on',p.dataset.time===fTime));
  // 负责人
  syncWhoPills();
}

function setF(type,val){
  if(type==='ch')fCh=val;
  else if(type==='st')fSt=val;
  else if(type==='ql')fQl=val;
  renderFilterPills();applyFilters();
}

function buildWhoPills(){
  const names=new Set(allLeads.map(l=>l.added_by||'未知').filter(Boolean));
  let h=`<button class="pill on" data-who="all">全部</button>`;
  names.forEach(n=>{h+=`<button class="pill" data-who="${esc(n)}">${esc(n)}</button>`;});
  document.getElementById('who-pills').innerHTML=h;
  document.querySelectorAll('#who-pills .pill').forEach(p=>{
    p.addEventListener('click',()=>{ fWho=p.dataset.who; syncWhoPills(); applyFilters(); renderTeam(); });
  });
}
function syncWhoPills(){
  document.querySelectorAll('#who-pills .pill').forEach(p=>p.classList.toggle('on',p.dataset.who===fWho));
}

// ═══════════════════════════════════════════
// 表格渲染
// ═══════════════════════════════════════════
function chColor(name){return allChannels.find(x=>x.name===name)?.color||'gray'}
function stColor(name){return allStatuses.find(x=>x.name===name)?.color||'gray'}
function qlColor(name){return allQualities.find(x=>x.name===name)?.color||'gray'}

function renderTable(filtered){
  const tbody=document.getElementById('tbody');
  const countEl=document.getElementById('result-count');
  if(!filtered?.length){
    tbody.innerHTML='<div class="empty">暂无线索</div>';
    countEl.style.display='none';
    return;
  }

  tbody.innerHTML=filtered.map(l=>{
    const contacts=[];
    if(l.contact_name)contacts.push(`<span class="contact-item">👤 ${esc(l.contact_name)}</span>`);
    if(l.phone)contacts.push(`<span class="contact-item">📱 ${esc(l.phone)}</span>`);
    if(l.email_contact)contacts.push(`<span class="contact-item">✉ ${esc(l.email_contact)}</span>`);
    if(l.wechat)contacts.push(`<span class="contact-item">💬 ${esc(l.wechat)}</span>`);
    if(l.note)contacts.push(`<span class="contact-item" style="color:#bbb;font-style:italic">${esc(l.note)}</span>`);
    const isUrl=l.value.startsWith('http');
    const valHtml=isUrl?`<a href="${esc(l.value)}" target="_blank" title="${esc(l.value)}">${esc(l.value)}</a>`:esc(l.value);

    const [ab,at]=nameColor(l.added_by);
    const ini=(l.added_by||'?').charAt(0).toUpperCase();

    // 质量徽章：有值显示彩色大徽章，无值显示虚线占位
    const qlHtml = l.quality
      ? `<span class="badge-quality" style="${badgeStyle(qlColor(l.quality))}" onclick="openDrop('${l.id}','ql',this)">${esc(l.quality)}</span>`
      : `<button class="badge-empty" onclick="openDrop('${l.id}','ql',this)">+ 标记</button>`;

    return `
    <div class="t-row">
      <div>
        <div class="lead-val">${valHtml}</div>
        ${contacts.length?`<div class="lead-sub">${contacts.join('')}</div>`:''}
      </div>
      <div><span class="badge" style="${badgeStyle(chColor(l.channel))}" onclick="openDrop('${l.id}','ch',this)">${esc(l.channel||'—')}</span></div>
      <div><span class="badge" style="${badgeStyle(stColor(l.status))}" onclick="openDrop('${l.id}','st',this)">${esc(l.status||'—')}</span></div>
      <div>${qlHtml}</div>
      <div class="who" onclick="openTransfer('${l.id}')" title="点击转让负责人">
        <div class="who-av" style="background:${ab};color:${at}">${ini}</div>
        <span class="who-name">${esc(l.added_by||'未知')}</span>
        <span class="who-icon">⇄</span>
      </div>
      <div class="lead-time">${fmtDate(l.created_at)}</div>
      <div class="row-btns">
        <button class="row-btn" onclick="copyVal('${esc(l.value)}')">复制</button>
        <button class="row-btn del" onclick="deleteLead('${l.id}')">删除</button>
      </div>
    </div>`;
  }).join('');

  countEl.style.display='block';
  countEl.textContent=filtered.length===allLeads.length
    ?`共 ${allLeads.length} 条线索`
    :`筛选结果：${filtered.length} 条（共 ${allLeads.length} 条）`;
}

// ═══════════════════════════════════════════
// 全局下拉（渠道 / 状态 / 质量）
// ═══════════════════════════════════════════
function openDrop(leadId, type, anchorEl){
  const drop=document.getElementById('global-drop');
  if(openDropId===leadId&&openDropType===type){closeDrop();return;}
  const options=type==='ch'?allChannels:type==='st'?allStatuses:allQualities;
  let html=options.map(o=>{
    const[bg]=COLORS[o.color]||COLORS.gray;
    return`<div class="drop-opt" data-id="${esc(leadId)}" data-type="${type}" data-val="${esc(o.name)}"><span class="drop-dot" style="background:${bg}"></span>${esc(o.name)}</div>`;
  }).join('');
  // 质量额外加"清除"选项
  if(type==='ql'){
    html+=`<div class="drop-divider"></div><div class="drop-none" data-id="${esc(leadId)}" data-type="ql" data-val="__clear__">× 清除标记</div>`;
  }
  drop.innerHTML=html;
  const rect=anchorEl.getBoundingClientRect();
  const spaceBelow=window.innerHeight-rect.bottom;
  drop.style.minWidth=Math.max(120,rect.width+40)+'px';
  if(spaceBelow<200){drop.style.bottom=(window.innerHeight-rect.top+4)+'px';drop.style.top='';}
  else{drop.style.top=(rect.bottom+4)+'px';drop.style.bottom='';}
  drop.style.left=rect.left+'px';
  drop.classList.add('open');
  openDropId=leadId;openDropType=type;
}

function closeDrop(){
  document.getElementById('global-drop').classList.remove('open');
  openDropId=null;openDropType=null;
}

document.addEventListener('click',e=>{
  const opt=e.target.closest('.drop-opt,.drop-none');
  if(opt){
    const id=opt.dataset.id,type=opt.dataset.type,val=opt.dataset.val;
    closeDrop();
    if(type==='ql'){
      updateLeadField(id,'quality',val==='__clear__'?null:val);
    } else if(type==='ch'){
      updateLeadField(id,'channel',val);
    } else {
      updateLeadField(id,'status',val);
    }
    return;
  }
  if(!e.target.closest('.badge,.badge-quality,.badge-empty,.global-drop')){closeDrop();}
});

async function updateLeadField(id,field,value){
  setSyncing(true);
  try{
    await api(`/leads?id=eq.${id}`,{method:'PATCH',body:JSON.stringify({[field]:value})});
    const l=allLeads.find(x=>x.id===id);
    if(l)l[field]=value;
    applyFilters();renderTeam();
  }catch(e){alert('更新失败：'+e.message);}
  finally{setSyncing(false);}
}

// ═══════════════════════════════════════════
// 转让负责人
// ═══════════════════════════════════════════
function openTransfer(leadId){
  const lead=allLeads.find(l=>l.id===leadId);
  if(!lead)return;
  transferLeadId=leadId;
  transferSelectedMember=null;

  document.getElementById('transfer-desc').textContent=
    `「${(lead.value||'').slice(0,30)}」当前负责人：${lead.added_by||'未知'}`;

  // 统计系统内所有出现过的人名
  const counts={};
  allLeads.forEach(l=>{const n=l.added_by||'未知';counts[n]=(counts[n]||0)+1;});
  const members=Object.keys(counts).sort((a,b)=>counts[b]-counts[a]);

  document.getElementById('member-list').innerHTML=members.map(name=>{
    const [ab,at]=nameColor(name);
    const isCurrent=name===(lead.added_by||'未知');
    return `<div class="member-opt${isCurrent?' selected':''}" data-name="${esc(name)}" onclick="selectMember('${esc(name)}',this)">
      <div class="m-av" style="background:${ab};color:${at}">${name.charAt(0).toUpperCase()}</div>
      <span class="m-name">${esc(name)}${isCurrent?' <span style="font-size:11px;color:#bbb;font-weight:400">（当前）</span>':''}</span>
      <span class="m-count">${counts[name]} 条</span>
    </div>`;
  }).join('');

  document.getElementById('btn-confirm-transfer').disabled=true;
  document.getElementById('transfer-modal').classList.remove('hidden');
}

function selectMember(name, el){
  transferSelectedMember=name;
  document.querySelectorAll('.member-opt').forEach(x=>x.classList.remove('selected'));
  el.classList.add('selected');
  const lead=allLeads.find(l=>l.id===transferLeadId);
  const isSame=name===(lead?.added_by||'未知');
  document.getElementById('btn-confirm-transfer').disabled=isSame;
}

async function confirmTransfer(){
  if(!transferLeadId||!transferSelectedMember)return;
  setSyncing(true);
  try{
    await api(`/leads?id=eq.${transferLeadId}`,{method:'PATCH',body:JSON.stringify({added_by:transferSelectedMember})});
    const l=allLeads.find(x=>x.id===transferLeadId);
    if(l)l.added_by=transferSelectedMember;
    buildWhoPills();applyFilters();renderTeam();
    closeTransfer();
  }catch(e){alert('转让失败：'+e.message);}
  finally{setSyncing(false);}
}

function closeTransfer(){
  document.getElementById('transfer-modal').classList.add('hidden');
  transferLeadId=null;transferSelectedMember=null;
}

// ═══════════════════════════════════════════
// 团队贡献
// ═══════════════════════════════════════════
function renderTeam(){
  const filtered=getFiltered();
  const cnt={};
  filtered.forEach(l=>{const n=l.added_by||'未知';cnt[n]=(cnt[n]||0)+1;});
  const members=Object.keys(cnt);
  const box=document.getElementById('team-box');
  if(!members.length){box.style.display='none';return;}
  box.style.display='block';
  document.getElementById('team-list').innerHTML=members.sort((a,b)=>cnt[b]-cnt[a]).map(n=>{
    const[ab,at]=nameColor(n);const isOn=fWho===n;
    return`<div class="team-chip${isOn?' on':''}" onclick="clickWho('${esc(n)}')">
      <div class="team-av" style="background:${ab};color:${at}">${n.charAt(0).toUpperCase()}</div>
      <span class="team-n">${esc(n)}</span><span class="team-c">${cnt[n]} 条</span>
    </div>`;
  }).join('');
}

function clickWho(name){fWho=fWho===name?'all':name;syncWhoPills();applyFilters();renderTeam();}

// ═══════════════════════════════════════════
// 设置抽屉
// ═══════════════════════════════════════════
function renderDrawer(){
  renderCfgList('ch-list',allChannels,'delChannel');
  renderCfgList('st-list',allStatuses,'delStatus');
  renderCfgList('ql-list',allQualities,'delQuality');
  renderSwatches('ch-swatches','ch',newChColor);
  renderSwatches('st-swatches','st',newStColor);
  renderSwatches('ql-swatches','ql',newQlColor);
}

function renderCfgList(elId,list,delFn){
  document.getElementById(elId).innerHTML=list.map(c=>{
    const[bg]=COLORS[c.color]||COLORS.gray;
    return`<div class="cfg-item"><span class="cfg-dot" style="background:${bg}"></span><span class="cfg-name">${esc(c.name)}</span><button class="cfg-del" onclick="${delFn}('${c.id}','${esc(c.name)}')">×</button></div>`;
  }).join('');
}

function renderSwatches(id,prefix,current){
  document.getElementById(id).innerHTML=COLOR_NAMES.map(c=>{
    const[bg]=COLORS[c];
    return`<div class="color-sw${c===current?' on':''}" style="background:${bg}" onclick="pickColor('${prefix}','${c}')"></div>`;
  }).join('');
}

function pickColor(prefix,color){
  if(prefix==='ch')newChColor=color;
  else if(prefix==='st')newStColor=color;
  else newQlColor=color;
  renderDrawer();
}

async function addChannel(){
  const name=document.getElementById('new-ch').value.trim();
  if(!name||allChannels.find(c=>c.name===name)){alert(name?'已存在':'请填写名称');return}
  const row=await api('/lead_channels',{method:'POST',headers:{'Prefer':'return=representation'},body:JSON.stringify({name,color:newChColor,sort_order:allChannels.length+1})});
  if(row)allChannels.push(Array.isArray(row)?row[0]:row);
  document.getElementById('new-ch').value='';renderFilterPills();renderDrawer();
}
async function addStatus(){
  const name=document.getElementById('new-st').value.trim();
  if(!name||allStatuses.find(s=>s.name===name)){alert(name?'已存在':'请填写名称');return}
  const row=await api('/lead_statuses',{method:'POST',headers:{'Prefer':'return=representation'},body:JSON.stringify({name,color:newStColor,sort_order:allStatuses.length+1})});
  if(row)allStatuses.push(Array.isArray(row)?row[0]:row);
  document.getElementById('new-st').value='';renderFilterPills();renderDrawer();applyFilters();
}
async function addQuality(){
  const name=document.getElementById('new-ql').value.trim();
  if(!name||allQualities.find(q=>q.name===name)){alert(name?'已存在':'请填写名称');return}
  const row=await api('/lead_qualities',{method:'POST',headers:{'Prefer':'return=representation'},body:JSON.stringify({name,color:newQlColor,sort_order:allQualities.length+1})});
  if(row)allQualities.push(Array.isArray(row)?row[0]:row);
  document.getElementById('new-ql').value='';renderFilterPills();renderDrawer();applyFilters();
}
async function delChannel(id,name){
  if(!confirm(`删除渠道「${name}」？`))return;
  await api(`/lead_channels?id=eq.${id}`,{method:'DELETE'});
  allChannels=allChannels.filter(c=>c.id!==id);renderFilterPills();renderDrawer();
}
async function delStatus(id,name){
  if(!confirm(`删除状态「${name}」？`))return;
  await api(`/lead_statuses?id=eq.${id}`,{method:'DELETE'});
  allStatuses=allStatuses.filter(s=>s.id!==id);renderFilterPills();renderDrawer();applyFilters();
}
async function delQuality(id,name){
  if(!confirm(`删除质量标签「${name}」？`))return;
  await api(`/lead_qualities?id=eq.${id}`,{method:'DELETE'});
  allQualities=allQualities.filter(q=>q.id!==id);renderFilterPills();renderDrawer();applyFilters();
}

function openDrawer(){document.getElementById('drawer').classList.add('open')}
function closeDrawer(){document.getElementById('drawer').classList.remove('open')}

// ═══════════════════════════════════════════
// 导出
// ═══════════════════════════════════════════
function exportCSV(){
  const rows=getFiltered();
  if(!rows.length){alert('没有可导出的数据');return}
  const hdr=['线索内容','渠道','状态','质量','姓名','手机','邮箱','微信','备注','负责人','添加时间'];
  const body=rows.map(l=>[l.value,l.channel,l.status,l.quality||'',l.contact_name||'',l.phone||'',l.email_contact||'',l.wechat||'',l.note||'',l.added_by||'',fmtDate(l.created_at)].map(v=>`"${String(v).replace(/"/g,'""')}"`).join(','));
  const csv='\uFEFF'+[hdr.join(','),...body].join('\n');
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv;charset=utf-8;'}));
  a.download=`leads-${new Date().toISOString().slice(0,10)}.csv`;a.click();
}

function copyVal(v){navigator.clipboard?.writeText(v)}
async function deleteLead(id){
  if(!confirm('确认删除？'))return;
  try{await api(`/leads?id=eq.${id}`,{method:'DELETE'});allLeads=allLeads.filter(x=>x.id!==id);buildWhoPills();applyFilters();renderTeam();}
  catch(e){alert('删除失败：'+e.message);}
}

function setSyncing(v){document.getElementById('sdot').classList.toggle('spin',v);document.getElementById('stxt').textContent=v?'同步中...':'已同步'}
function saveConfig(){
  const url=document.getElementById('cfg-url').value.trim().replace(/\/$/,''),key=document.getElementById('cfg-key').value.trim();
  if(!url||!key){alert('请填写完整信息');return}
  C={url,key};localStorage.setItem('liCfg',JSON.stringify(C));
  document.getElementById('overlay').classList.add('hidden');
  loadAll();setInterval(loadAll,30000);
}
function resetCfg(){localStorage.removeItem('liCfg');location.reload()}

// ═══════════════════════════════════════════
// 初始化
// ═══════════════════════════════════════════
document.addEventListener('DOMContentLoaded',()=>{
  document.getElementById('time-pills').addEventListener('click',e=>{
    const p=e.target.closest('.pill');if(!p)return;
    fTime=p.dataset.time;
    document.querySelectorAll('#time-pills .pill').forEach(x=>x.classList.toggle('on',x.dataset.time===fTime));
    applyFilters();
  });
  document.getElementById('btn-connect').addEventListener('click',saveConfig);
  const saved=localStorage.getItem('liCfg');
  if(saved){try{C=JSON.parse(saved);document.getElementById('overlay').classList.add('hidden');loadAll();setInterval(loadAll,30000);}catch(e){}}
});
