let wakeMonth='';
// wakeData: { 'leadId|month': true }  — in-memory cache loaded from Supabase
let wakeData={};

async function loadWakeData(){
  try{
    const rows=await api('/wake_records?select=lead_id,month,done');
    wakeData={};
    rows.forEach(r=>{wakeData[r.lead_id+'|'+r.month]=r.done;});
  }catch(e){console.warn('wake_records load failed',e);}
}

async function wakeToggle(leadId,done){
  const key=leadId+'|'+wakeMonth;
  wakeData[key]=done;
  renderWakeTab();
  try{
    await api('/wake_records',{
      method:'POST',
      headers:{'Prefer':'resolution=merge-duplicates'},
      body:JSON.stringify({lead_id:leadId,month:wakeMonth,done,updated_at:new Date().toISOString()})
    });
  }catch(e){alert('保存失败：'+e.message);}
}

function getWakeLeads(){
  const now=new Date();
  const thisMonthStart=new Date(now.getFullYear(),now.getMonth(),1);
  const [wYear,wMon]=wakeMonth?wakeMonth.split('-').map(Number):[now.getFullYear(),now.getMonth()+1];
  const isCurrentMonth=wYear===now.getFullYear()&&wMon===now.getMonth()+1;

  return allLeads.filter(l=>{
    if(l.status!=='建联中')return false;
    const created=new Date(l.created_at);
    if(isCurrentMonth){
      // 当月：录入时间早于本月1号（至少经历过一个完整月）
      // 且：未勾选 或 勾选了（都显示，勾选的灰显）
      // 关键：未勾选的永不消失，勾选的本月内继续显示
      return created<thisMonthStart;
    } else {
      // 历史月份：录入时间早于该月1号
      const monthStart=new Date(wYear,wMon-1,1);
      return created<monthStart;
    }
  });
}

function renderWakeMonthPills(){
  const now=new Date();
  const start=new Date(2026,3,1);
  const options=[];
  for(let d=new Date(now.getFullYear(),now.getMonth(),1);d>=start;d.setMonth(d.getMonth()-1)){
    const key=`${d.getFullYear()}-${d.getMonth()+1}`;
    const isCurrent=d.getFullYear()===now.getFullYear()&&d.getMonth()===now.getMonth();
    const label=isCurrent?`本月（${d.getMonth()+1}月）`:`${d.getFullYear()}/${d.getMonth()+1}`;
    options.push({key,label});
  }
  if(!wakeMonth)wakeMonth=options[0].key;
  const el=document.getElementById('wake-month-pills');
  if(!el)return;
  el.innerHTML=options.map(o=>`<button class="goal-month-pill${wakeMonth===o.key?' on':''}" onclick="setWakeMonth('${o.key}')">${o.label}</button>`).join('');
}

function setWakeMonth(key){wakeMonth=key;renderWakeMonthPills();renderWakeTab();}

const wakeExpanded=new Set(); // 展开标签编辑的 leadId

function renderWakeTab(){
  renderWakeMonthPills();
  const el=document.getElementById('wake-body');
  if(!el)return;

  const isDone=id=>!!(wakeData[id+'|'+wakeMonth]);
  const wakeLeads=getWakeLeads();
  const doneCount=wakeLeads.filter(l=>isDone(l.id)).length;
  const pending=wakeLeads.length-doneCount;

  // Tab 角标
  const badge=document.getElementById('wake-badge');
  if(badge){if(pending>0){badge.style.display='inline';badge.textContent=pending;}else badge.style.display='none';}

  if(!wakeLeads.length){
    document.getElementById('wake-summary').textContent='';
    el.innerHTML=`<div class="wake-empty"><div class="wake-empty-icon">✨</div>暂无需要唤醒的客户<br><span style="font-size:11px">建联中且已超过一个自然月的客户会出现在这里</span></div>`;
    return;
  }

  document.getElementById('wake-summary').textContent=`${doneCount} / ${wakeLeads.length} 已完成`;

  // 按负责人分组
  const groups={};
  wakeLeads.forEach(l=>{
    const who=(l.added_by||'').trim()||'未知';
    if(!groups[who])groups[who]=[];
    groups[who].push(l);
  });

  const cols=Object.entries(groups).sort((a,b)=>a[0].localeCompare(b[0])).map(([who,leads])=>{
    const groupDone=leads.filter(l=>isDone(l.id)).length;
    const items=leads.map(l=>{
      const isLeadDone=isDone(l.id);
      const nameVal=l.value||'—';
      const isUrl=/^https?:\/\//i.test(nameVal);
      const nameHtml=isUrl
        ?`<a href="${esc(nameVal)}" target="_blank" rel="noopener" class="wake-link">${esc(nameVal)}</a>`
        :esc(nameVal);
      const months=monthsSince(l.created_at);
      const sinceLabel=months<=1?'建联 1 个月':`建联 ${months} 个月`;
      const contact=[l.contact_name,l.phone||l.wechat||l.email_contact].filter(Boolean).join(' · ');

      const expanded=wakeExpanded.has(l.id);

      // 行内标签选择器（展开时显示）
      const mkSelect=(label,field,opts,cur)=>{
        const id=`wks-${l.id}-${field}`;
        const optHtml=`<option value="">— ${label} —</option>`+opts.map(o=>`<option value="${esc(o.name)}"${cur===o.name?' selected':''}>${esc(o.name)}</option>`).join('');
        return`<select class="wake-sel" id="${id}" onchange="wakeUpdateField('${l.id}','${field}',this.value)">${optHtml}</select>`;
      };
      const tagEditor=expanded?`<div class="wake-tag-row">
        ${mkSelect('状态','status',allStatuses,l.status)}
        ${mkSelect('质量','quality',allQualities,l.quality)}
        ${mkSelect('价值','priority',allPriorities,l.priority)}
      </div>`:'';

      return`<div class="wake-row${isLeadDone?' done':''}">
        <div style="display:flex;align-items:flex-start;gap:10px;width:100%">
          <div class="wake-check${isLeadDone?' checked':''}" onclick="wakeToggle('${l.id}',${!isLeadDone})" style="margin-top:2px"></div>
          <div class="wake-row-info">
            <div class="wake-row-name">${nameHtml}</div>
            <div class="wake-row-meta">
              ${l.channel?`<span class="wake-tag">${esc(l.channel)}</span>`:''}
              ${l.status?`<span class="wake-tag" style="border-color:#ddd">${esc(l.status)}</span>`:''}
              ${l.quality?`<span class="wake-tag">${esc(l.quality)}</span>`:''}
              ${l.priority?`<span class="wake-tag">${esc(l.priority)}</span>`:''}
              ${contact?`<span class="wake-contact">${esc(contact)}</span>`:''}
              <span class="wake-since">${sinceLabel}</span>
            </div>
            ${tagEditor}
          </div>
          <button class="wake-edit-btn${expanded?' active':''}" onclick="wakeToggleExpand('${l.id}')" title="修改标签">
            <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M11.5 2.5l2 2-7 7H4.5v-2l7-7z"/><path d="M10 4l2 2"/></svg>
          </button>
        </div>
      </div>`;
    }).join('');

    return`<div class="wake-col">
      <div class="wake-col-head">
        <span class="wake-col-name">${esc(who)}</span>
        <span class="wake-group-badge">${groupDone}/${leads.length}</span>
      </div>
      ${items}
    </div>`;
  }).join('');

  el.innerHTML=`<div class="wake-cols" style="grid-template-columns:repeat(${Object.keys(groups).length},1fr)">${cols}</div>`;
}

function monthsSince(ts){
  const now=new Date(),d=new Date(ts);
  return(now.getFullYear()-d.getFullYear())*12+(now.getMonth()-d.getMonth());
}

function wakeToggleExpand(leadId){
  if(wakeExpanded.has(leadId))wakeExpanded.delete(leadId);
  else wakeExpanded.add(leadId);
  renderWakeTab();
}

async function wakeUpdateField(leadId,field,value){
  const l=allLeads.find(x=>x.id===leadId);
  if(!l)return;
  const patch={[field]:value||null};
  try{
    await api(`/leads?id=eq.${leadId}`,{method:'PATCH',body:JSON.stringify(patch)});
    Object.assign(l,patch);
    applyFilters(false);
    renderWakeTab();
  }catch(e){alert('保存失败：'+e.message);}
}

// ═══════════════════════════════════════════
// updateGoal (existing, kept here)
function updateGoal(){
  const elv=document.getElementById('goal-input-val');
  const v=parseInt(elv&&elv.value);
  if(!isNaN(v)&&v>0){goalTarget=v;localStorage.setItem('liGoal',v);renderGoalTab();}
}

// ═══════════════════════════════════════════
// 设置抽屉
// ═══════════════════════════════════════════
const DRAWER_CFG={
  channel:{list:'ch-list',input:'new-ch',table:'lead_channels',arr:()=>allChannels,push:r=>allChannels.push(r),filter:id=>allChannels=allChannels.filter(c=>c.id!==id),sw:'ch-swatches',colorKey:'channel'},
  status:{list:'st-list',input:'new-st',table:'lead_statuses',arr:()=>allStatuses,push:r=>allStatuses.push(r),filter:id=>allStatuses=allStatuses.filter(s=>s.id!==id),sw:'st-swatches',colorKey:'status'},
  quality:{list:'ql-list',input:'new-ql',table:'lead_qualities',arr:()=>allQualities,push:r=>allQualities.push(r),filter:id=>allQualities=allQualities.filter(q=>q.id!==id),sw:'ql-swatches',colorKey:'quality'},
  priority:{list:'pr-list',input:'new-pr',table:'lead_priorities',arr:()=>allPriorities,push:r=>allPriorities.push(r),filter:id=>allPriorities=allPriorities.filter(p=>p.id!==id),sw:'pr-swatches',colorKey:'priority'}
};

function renderDrawer(){
  for(const[type,dc] of Object.entries(DRAWER_CFG)){
    const cur=newColors[type];
    document.getElementById(dc.list).innerHTML=dc.arr().map(c=>{const[bg]=COLORS[c.color]||COLORS.gray;return`<div class="cfg-item"><span class="cfg-dot" style="background:${bg}"></span><span class="cfg-name">${esc(c.name)}</span><button class="cfg-del" onclick="delItem('${type}','${c.id}','${esc(c.name)}')">×</button></div>`;}).join('');
    document.getElementById(dc.sw).innerHTML=COLOR_NAMES.map(col=>{const[bg]=COLORS[col];return`<div class="color-sw${col===cur?' on':''}" style="background:${bg}" onclick="pickColor('${type}','${col}')"></div>`;}).join('');
  }
}
function pickColor(type,color){newColors[type]=color;renderDrawer();}

async function addItem(type){
  const dc=DRAWER_CFG[type];
  const name=document.getElementById(dc.input).value.trim();
  if(!name||dc.arr().find(c=>c.name===name)){alert(name?'已存在':'请填写名称');return;}
  const row=await api(`/${dc.table}`,{method:'POST',headers:{'Prefer':'return=representation'},body:JSON.stringify({name,color:newColors[type],sort_order:dc.arr().length+1})});
  if(row)dc.push(Array.isArray(row)?row[0]:row);
  document.getElementById(dc.input).value='';
  renderFilterPills();renderDrawer();applyFilters();renderAnalyticsTab();renderGoalTab();
}

async function delItem(type,id,name){
  const dc=DRAWER_CFG[type];
  if(!confirm(`删除「${name}」？`))return;
  await api(`/${dc.table}?id=eq.${id}`,{method:'DELETE'});
  dc.filter(id);renderFilterPills();renderDrawer();applyFilters();renderAnalyticsTab();renderGoalTab();
}

function openDrawer(){document.getElementById('drawer').classList.add('open')}
function closeDrawer(){document.getElementById('drawer').classList.remove('open')}

// ═══════════════════════════════════════════
// 工具
// ═══════════════════════════════════════════
function copyVal(v){if(navigator.clipboard)navigator.clipboard.writeText(v)}

async function deleteLead(id){
  if(!confirm('确认删除？'))return;
  try{
    await api(`/leads?id=eq.${id}`,{method:'DELETE'});
    allLeads=allLeads.filter(x=>x.id!==id);
    buildWhoPills();
    const f=getFiltered(),tp=Math.max(1,Math.ceil(f.length/PAGE_SIZE));
    if(currentPage>tp)currentPage=tp;
    renderStats(f);renderTable(f);renderTeam();renderAnalyticsTab();renderGoalTab();
  }catch(e){alert('删除失败：'+e.message);}
}

function setSyncing(v){document.getElementById('sdot').classList.toggle('spin',v);document.getElementById('stxt').textContent=v?'同步中...':'已同步'}

function exportCSV(){
  const rows=getFiltered();
  if(!rows.length){alert('没有可导出的数据');return}
  const hdr=['线索内容','渠道','状态','质量','跟进价值','姓名','手机','邮箱','微信','备注','负责人','添加时间'];
  const body=rows.map(l=>[l.value,l.channel,l.status,l.quality||'',l.priority||'',l.contact_name||'',l.phone||'',l.email_contact||'',l.wechat||'',l.note||'',l.added_by||'',fmtDate(l.created_at)].map(v=>`"${String(v).replace(/"/g,'""')}"`).join(','));
  const csv='\uFEFF'+[hdr.join(','),...body].join('\n');
  const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv;charset=utf-8;'}));a.download=`leads-${new Date().toISOString().slice(0,10)}.csv`;a.click();
}

function saveConfig(){
  const url=document.getElementById('cfg-url').value.trim().replace(/\/$/,''),key=document.getElementById('cfg-key').value.trim();
  if(!url||!key){alert('请填写完整信息');return}
  C={url,key};localStorage.setItem('liCfg',JSON.stringify(C));
  document.getElementById('overlay').classList.add('hidden');
  loadAll();setInterval(loadAll,30000);
}
function resetCfg(){localStorage.removeItem('liCfg');location.reload()}

// ═══════════════════════════════════════════
// Tab 切换
// ═══════════════════════════════════════════
function initTabs(){
  document.querySelectorAll('.tab-btn').forEach(btn=>{
    btn.addEventListener('click',()=>{
      document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('on'));
      document.querySelectorAll('.tab-content').forEach(c=>c.classList.remove('on'));
      btn.classList.add('on');
      document.getElementById(btn.dataset.tab).classList.add('on');
    });
  });
}

// ═══════════════════════════════════════════
// 初始化
// ═══════════════════════════════════════════
document.addEventListener('DOMContentLoaded',()=>{
  initTabs();

  document.getElementById('time-pills').addEventListener('click',e=>{
    const p=e.target.closest('.pill');if(!p)return;
    fTime=p.dataset.time;document.querySelectorAll('#time-pills .pill').forEach(x=>x.classList.toggle('on',x.dataset.time===fTime));applyFilters();
  });

  document.getElementById('btn-connect').addEventListener('click',saveConfig);

  const saved=localStorage.getItem('liCfg');
  if(saved){try{C=JSON.parse(saved);document.getElementById('overlay').classList.add('hidden');loadAll();setInterval(loadAll,30000);}catch(e){}}
});

</script>
